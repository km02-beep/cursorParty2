<!doctype html>
<html>
  <head>
    <title>Cursor Party</title>
    <style>
      .cursor {
        position: absolute;
        width: 15px;
        height: 15px;
        background: blue;
        border-radius: 50%;
        pointer-events: none;
      }

      #instructions {
        position: fixed;
        top: 20px;
        left: 20px;
        font-family: sans-serif;
        font-size: 16px;
        background: rgba(255, 255, 255, 0.8);
        padding: 8px 12px;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <h1>Cursor Party</h1>
    <p id="instructions">Click anywhere to enable sound!</p>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();
      const otherCursors = {};
      const myPosition = { x: 0, y: 0 };
      let audioCtx = null;
      let lastHit = 0;
      let lastEmit = 0;

      // 1. Initialize audio (must be triggered by user click)
      window.addEventListener("click", () => {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          document.getElementById("instructions").innerText =
            "Sound enabled! Go bump into someone!";
        }
      });

      // 2. Play collision sound
      function playHitSound() {
        if (!audioCtx || audioCtx.state === "suspended") return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = "sine";
        osc.frequency.setValueAtTime(880, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(
          0.01,
          audioCtx.currentTime + 0.1,
        );
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
      }

      // 3. Track mouse movement — throttled to ~60fps, scroll-aware
      window.addEventListener("mousemove", (e) => {
        const now = Date.now();
        if (now - lastEmit < 16) return;
        lastEmit = now;

        myPosition.x = e.clientX + window.scrollX;
        myPosition.y = e.clientY + window.scrollY;

        socket.emit("cursor-move", { x: myPosition.x, y: myPosition.y });
        checkCollision();
      });

      // 4. Receive other cursors
      socket.on("cursor-update", (data) => {
        if (!otherCursors[data.id]) {
          const div = document.createElement("div");
          div.className = "cursor";
          div.style.backgroundColor = data.color;
          document.body.appendChild(div);
          otherCursors[data.id] = { el: div, x: 0, y: 0 };
        }

        const c = otherCursors[data.id];
        c.x = data.x;
        c.y = data.y;
        c.el.style.left = c.x + "px";
        c.el.style.top = c.y + "px";
        checkCollision();
      });

      // 5. Collision detection — with 300ms cooldown so sound doesn't spam
      function checkCollision() {
        const now = Date.now();
        if (now - lastHit < 300) return;

        for (let id in otherCursors) {
          const other = otherCursors[id];
          const dx = myPosition.x - other.x;
          const dy = myPosition.y - other.y;
          const distance = Math.sqrt(dx * dx + dy * dy);

          if (distance < 20) {
            playHitSound();
            lastHit = now;
            break; // one sound per collision check is enough
          }
        }
      }

      // 6. Remove cursor when someone leaves
      socket.on("user-left", (id) => {
        if (otherCursors[id]) {
          otherCursors[id].el.remove();
          delete otherCursors[id];
        }
      });
    </script>
  </body>
</html>
